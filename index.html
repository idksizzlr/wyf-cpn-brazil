document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

olor:#fff;border-color:var(--verde);\n}\n.rail-bar{\n  position:absolute;left:0;right:0;bottom:0;\n  height:2px;background:transparent;overflow:hidden;\n}\n.rail-bar i{\n  display:block;height:100%;\n  width:var(--p,0%);\n  background:linear-gradient(90deg,var(--verde),var(--amarelo) 50%,var(--rosa));\n  transition:width .15s linear;\n}\n\n/* ============= HERO ============= */\n.hero{\n  padding:140px 28px 80px;\n  max-width:980px;margin:0 auto;\n  position:relative;\n}\n.hero-grid{\n  display:grid;\n  grid-template-columns:1fr auto;\n  align-items:end;\n  gap:32px;\n}\n.hero-eyebrow{\n  display:inline-flex;align-items:center;gap:9px;\n  font-family:var(--display);\n  font-size:.7rem;font-weight:600;\n  letter-spacing:.2em;text-transform:uppercase;\n  color:var(--preto);\n  padding:7px 14px 7px 12px;\n  border:1.5px solid var(--preto);\n  border-radius:30px;\n  background:var(--cream);\n  margin-bottom:32px;\n}\n.hero-eyebrow .e-dot{\n  width:7px;height:7px;border-radius:50%;background:var(--rosa);\n}\n\n.hero-title{\n  font-family:var(--display);\n  font-weight:800;\n  font-size:clamp(3rem,9vw,6.5rem);\n  line-height:.92;\n  letter-spacing:-.045em;\n  color:var(--preto);\n  font-optical-sizing:auto;\n  text-wrap:balance;\n}\n.hero-title .verde{color:var(--verde)}\n.hero-title .rosa{color:var(--rosa)}\n.hero-title .amarelo{color:var(--amarelo-dark)}\n.hero-title .word{display:inline-block}\n\n.hero-side{\n  display:flex;flex-direction:column;align-items:flex-end;gap:14px;\n  text-align:right;\n}\n.hero-side .logo{width:84px;display:block}\n\n.hero-desc{\n  margin-top:32px;\n  max-width:560px;\n  font-size:1.05rem;\n  line-height:1.55;\n  color:var(--grafite);\n  font-weight:400;\n}\n.hero-desc strong{\n  color:var(--preto);\n  font-weight:600;\n  background:linear-gradient(180deg,transparent 62%,var(--amarelo-soft) 62%);\n  padding:0 2px;\n}\n\n/* tri-bar */\n\n\n/* ============= FORM ============= */\n.form{\n  max-width:980px;margin:0 auto;\n  padding:48px 28px 80px;\n}\n\n/* SECTION */\n.sec{\n  display:grid;\n  grid-template-columns:160px 1fr;\n  gap:48px;\n  padding:64px 0 56px;\n  border-bottom:1px solid var(--linha);\n  position:relative;\n}\n.sec:last-of-type{border-bottom:none}\n.sec-num{\n  position:sticky;\n  top:90px;\n  height:fit-content;\n  align-self:start;\n}\n.sec-num .big{\n  font-family:var(--display);\n  font-size:5.5rem;\n  font-weight:800;\n  letter-spacing:-.06em;\n  line-height:.85;\n  color:var(--preto);\n  display:inline-block;\n}\n.sec-num .num-row{\n  display:flex;\n  align-items:baseline;\n  gap:6px;\n}\n.sec-num .of{\n  font-family:var(--display);\n  font-size:1rem;\n  font-weight:600;\n  letter-spacing:-.01em;\n  color:var(--cinza);\n  margin-top:0;\n}\n.sec-num .swatch{\n  display:block;\n  margin-top:14px;\n  width:42px;height:6px;border-radius:6px;\n}\n.sec1 .sec-num .swatch{background:var(--verde)}\n.sec2 .sec-num .swatch{background:var(--amarelo)}\n.sec3 .sec-num .swatch{background:var(--azul)}\n.sec4 .sec-num .swatch{background:var(--rosa)}\n\n.sec-body{min-width:0}\n\n.sec-kicker{\n  font-family:var(--display);\n  font-size:.7rem;font-weight:600;\n  letter-spacing:.22em;text-transform:uppercase;\n  color:var(--cinza);\n  margin-bottom:14px;\n}\n.sec-title{\n  font-family:var(--display);\n  font-size:clamp(1.8rem,3.4vw,2.6rem);\n  font-weight:700;\n  line-height:1;\n  letter-spacing:-.025em;\n  color:var(--preto);\n  margin-bottom:18px;\n  text-wrap:balance;\n}\n.sec-title .accent{font-weight:800;letter-spacing:-.03em}\n.sec1 .sec-title .accent{color:var(--verde-dark)}\n.sec2 .sec-title .accent{color:var(--amarelo-dark)}\n.sec3 .sec-title .accent{color:var(--azul)}\n.sec4 .sec-title .accent{color:var(--rosa-dark)}\n\n.sec-lead{\n  font-size:.92rem;\n  line-height:1.6;\n  color:var(--grafite);\n  max-width:540px;\n  margin-bottom:36px;\n}\n\n/* FIELDS */\n.row{display:grid;gap:18px;margin-bottom:18px}\n.r1{grid-template-columns:1fr}\n.r2{grid-template-columns:1fr 1fr}\n.r3{grid-template-co ont-weight:800}\n.cta-desc{\n  max-width:480px;\n  font-size:.98rem;\n  line-height:1.55;\n  color:rgba(245,244,239,.78);\n  margin-bottom:32px;\n}\n\n.send{\n  font-family:var(--display);\n  font-size:1.05rem;\n  font-weight:700;\n  color:var(--preto);\n  background:var(--cream);\n  border:none;\n  border-radius:60px;\n  padding:18px 30px 18px 36px;\n  cursor:pointer;\n  letter-spacing:-.01em;\n  transition:all .2s ease;\n  display:inline-flex;align-items:center;gap:14px;\n  position:relative;\n}\n.send:hover:not(:disabled){\n  background:var(--verde);\n  color:#fff;\n  transform:translateY(-2px);\n  box-shadow:0 12px 32px rgba(45,179,74,.35);\n}\n.send:disabled{opacity:.4;cursor:not-allowed}\n.send .arrow{\n  display:inline-flex;align-items:center;justify-content:center;\n  width:34px;height:34px;border-radius:50%;\n  background:var(--preto);color:var(--cream);\n  font-size:1.2rem;\n  transition:transform .25s ease;\n}\n.send:hover:not(:disabled) .arrow{transform:translateX(4px)}\n\n.send-note{\n  margin-top:18px;\n  font-size:.78rem;color:rgba(245,244,239,.6);\n  position:relative;z-index:2;\n}\n\n.loading{\n  display:none;\n  font-family:var(--display);\n  font-size:.85rem;\n  color:var(--amarelo);\n  margin-top:18px;\n  position:relative;z-index:2;\n}\n.loading::after{\n  content:\"\";\n  display:inline-block;\n  width:6px;height:6px;border-radius:50%;\n  background:var(--amarelo);\n  margin-left:8px;\n  animation:dot 1s ease-in-out infinite;\n}\n@keyframes dot{\n  0%,100%{transform:scale(1);opacity:1}\n  50%{transform:scale(.5);opacity:.4}\n}\n\n.success{\n  display:none;\n  position:relative;z-index:2;\n  background:rgba(45,179,74,.18);\n  border:1px solid rgba(45,179,74,.5);\n  border-radius:18px;\n  padding:28px 32px;\n  margin-top:8px;\n}\n.success-eyebrow{\n  font-family:var(--display);\n  font-size:.7rem;font-weight:600;\n  letter-spacing:.22em;text-transform:uppercase;\n  color:var(--verde);\n  margin-bottom:10px;\n}\n.success-title{\n  font-family:var( n.rail-step.done{position:relative}\n.rail-step.done::after{\n  content:\"\";\n  position:absolute;\n  inset:0;\n  background:var(--verde);\n  border-radius:50%;\n  z-index:-1;\n}\n\n/* eyebrow blob: tap effect */\n.hero-eyebrow{\n  cursor:default;\n  transition:transform .25s cubic-bezier(.34,1.56,.64,1);\n}\n\n/* logo subtle float */\n.hero-side .logo{\n  animation:logoFloat 6s ease-in-out infinite;\n  transform-origin:center;\n}\n@keyframes logoFloat{\n  0%,100%{transform:translateY(0) rotate(0)}\n  50%{transform:translateY(-6px) rotate(-1.5deg)}\n}\n\n/* ambient cursor blob (desktop only) — disabled */\n.blob-cursor{display:none}\n\n/* CTA pulse on idle */\n.send:not(:disabled){\n  animation:sendBreathe 3.2s ease-in-out infinite;\n}\n@keyframes sendBreathe{\n  0%,100%{box-shadow:0 0 0 0 rgba(245,244,239,0)}\n  50%{box-shadow:0 0 0 6px rgba(245,244,239,.08)}\n}\n\n/* success bounce */\n.success{\n  animation:successIn .7s cubic-bezier(.34,1.56,.64,1);\n  transform-origin:left center;\n}\n@keyframes successIn{\n  0%{opacity:0;transform:translateY(20px) scale(.96)}\n  100%{opacity:1;transform:none}\n}\n\n/* progress rail bar - subtle glow */\n.rail-bar i{\n  filter:drop-shadow(0 0 6px rgba(45,179,74,.35));\n}\n\n/* reduced motion */\n@media(prefers-reduced-motion:reduce){\n  *,*::before,*::after{\n    animation-duration:.01ms !important;\n    animation-iteration-count:1 !important;\n    transition-duration:.01ms !important;\n  }\n  .sec{opacity:1;transform:none}\n}\n\n/* RESPONSIVE */\n@media(max-width:760px){\n  .rail-inner{padding:11px 18px;gap:12px}\n  .rail-mark{font-size:.7rem;letter-spacing:.14em}\n  .rail-step{width:22px;height:22px;font-size:.62rem}\n  .hero{padding:110px 22px 60px}\n  .hero-grid{grid-template-columns:1fr;align-items:start}\n  .hero-side{align-items:flex-start;text-align:left;flex-direction:row;justify-content:space-between;width:100%}\n  .hero-side .logo{width:64px}\n  .hero-desc{font-size:.98rem}\n  .form{padding:32px 22px 56px}\n  .sec{g 2Fspan><\u002Flabel>\n          <input type=\"text\" id=\"cidade\" placeholder=\"Onde você mora\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label class=\"lbl\" for=\"estado\">Estado <span class=\"req\">*<\u002Fspan><\u002Flabel>\n          <select id=\"estado\">\n            <option value=\"\">UF<\u002Foption>\n            <option>AC<\u002Foption><option>AL<\u002Foption><option>AP<\u002Foption><option>AM<\u002Foption><option>BA<\u002Foption><option>CE<\u002Foption><option>DF<\u002Foption><option>ES<\u002Foption><option>GO<\u002Foption><option>MA<\u002Foption><option>MT<\u002Foption><option>MS<\u002Foption><option>MG<\u002Foption><option>PA<\u002Foption><option>PB<\u002Foption><option>PR<\u002Foption><option>PE<\u002Foption><option>PI<\u002Foption><option>RJ<\u002Foption><option>RN<\u002Foption><option>RS<\u002Foption><option>RO<\u002Foption><option>RR<\u002Foption><option>SC<\u002Foption><option>SP<\u002Foption><option>SE<\u002Foption><option>TO<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label class=\"lbl\" for=\"idade\">Idade <span class=\"opt\">opcional<\u002Fspan><\u002Flabel>\n          <input type=\"text\" id=\"idade\" placeholder=\"Ex: 24\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"row r2\">\n        <div class=\"field\">\n          <label class=\"lbl\" for=\"formacao\">Formação <span class=\"req\">*<\u002Fspan><\u002Flabel>\n          <select id=\"formacao\">\n            <option value=\"\">Selecione<\u002Foption>\n            <option>Ensino médio completo<\u002Foption>\n            <option>Cursando graduação<\u002Foption>\n            <option>Graduação completa<\u002Foption>\n            <option>Pós-graduação / MBA<\u002Foption>\n            <option>Mestrado<\u002Foption>\n            <option>Doutorado<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label class=\"lbl\" for=\"area\">Área de formação <span class=\"opt\">opcional<\u002Fspan><\u002Flabel>\n          <input type=\"text\" id=\"area\" placeholder=\"Ex: Jornalismo, Design\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"row r1\"><div class=\"field\">\n        <label class=\"lbl\" for=\"ocupacao\">Ocupação atual <span class=\"req\">*<\u002Fspan><\u002Flabel>\n        <input type=\"text\" id=\"ocupacao\" placeholder=\"Ex: Designer, estudante, analista\">\n      <\u002Fdiv><\u002Fdiv>\n\n      <div class=\"row r1\"><div class=\"field\">\n        <label class=\"lbl\" for=\"militancia\">Militância ou atuação social <span class=\"opt\">opcional<\u002Fspan><\u002Flabel>\n        <input type=\"text\" id=\"militancia\" placeholder=\"Movimento estudantil, ONG, coletivo…\">\n        <span class=\"hint\">Coletivos, movimentos ou causas com que você se identifica.<\u002Fspan>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SEC 2 -->\n  <section class=\"sec sec2\" data-sec=\"1\">\n    <aside class=\"sec-num\">\n      <div class=\"num-row\"><span class=\"big\">02<\u002Fspan><span class=\"of\">/04<\u002Fspan><\u002Fdiv>\n      <span class=\"swatch\"><\u002Fspan>\n    <\u002Faside>\n    <div class=\"sec-body\">\n      <h2 class=\"sec-title\">Ferramentas e <span class=\"accent\">repertório<\u002Fspan>.<\u002Fh2>\n      <p class=\"sec-lead\">O que você usa, o que já entregou, como lê uma pauta.<\u002Fp>\n\n      <div class=\"chips-block\">\n        <span class=\"chips-q\">Ferramentas que você usa com frequência <span class=\"req\">*<\u002Fspan><\u002Fspan>\n        <div class=\"chips\">\n          <label class=\"chip\"><input type=\"checkbox\" name=\"tools\" value=\"Canva\"><span>Canva<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"tools\" value=\"Photoshop\"><span>Photoshop<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"tools\" value=\"Illustrator\"><span>Illustrator<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"tools\" value=\"Premiere\"><span>Premiere<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"tools\" value=\"CapCut\"><span>CapCut<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"tools\" value=\"Figma\"><span>Figma<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"tools\" value=\"InDesign\"><span>InDesign<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"tools\" value=\"After Effects\"><span>After Effects<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"tools\" value=\"Outros\"><span>Outros<\u002Fspan><\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"chips-block\">\n        <span class=\"chips-q\">Tipos de conteúdo que você já produziu <span class=\"req\">*<\u002Fspan><\u002Fspan>\n        <div class=\"chips\">\n          <label class=\"chip\"><input type=\"checkbox\" name=\"formatos\" value=\"Reels/Vídeos curtos\"><span>Reels / Vídeos curtos<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"formatos\" value=\"Carrosséis\"><span>Carrosséis<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"formatos\" value=\"Stories animados\"><span>Stories animados<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"formatos\" value=\"Posts estáticos\"><span>Posts estáticos<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"formatos\" value=\"Identidade visual\"><span>Identidade visual<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"formatos\" value=\"Flyers/Cartazes\"><span>Flyers / Cartazes<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"formatos\" value=\"Edição de vídeo longa\"><span>Edição de vídeo longa<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"formatos\" value=\"Motion graphics\"><span>Motion graphics<\u002Fspan><\u002Flabel>\n          <label class=\"chip\"><input type=\"checkbox\" name=\"formatos\" value=\"Trilha/Áudio\"><span>Trilha / Áudio<\u002Fspan><\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"scale-block\">\n        <p class=\"scale-q\">Como você avalia seu nível técnico em criação de conteúdo visual? <span class=\"req\">*<\u002Fspan><\u002Fp>\n        <div class=\"scale\">\n          <label><input type=\"radio\" name=\"nivel_visual\" value=\"1\"><div class=\"sb\">1<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"nivel_visual\" value=\"2\"><div class=\"sb\">2<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"nivel_visual\" value=\"3\"><div class=\"sb\">3<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"nivel_visual\" value=\"4\"><div class=\"sb\">4<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"nivel_visual\" value=\"5\"><div class=\"sb\">5<\u002Fdiv><\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"scale-ends\"><span>Iniciante<\u002Fspan><span>Avançado<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"rcq\">Você recebe um conteúdo para entregar amanhã. O que faz com isso? <span class=\"req\">*<\u002Fspan><\u002Fp>\n      <div class=\"rcards\">\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_reel\" value=\"1\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Acho o prazo apertado e prefiro pedir ajuda ou mais tempo, em vez de entregar algo abaixo do nível.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_reel\" value=\"2\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Pego um template pronto no Canva, coloco as informações e mando dentro do prazo.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_reel\" value=\"3\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Monto do zero com a minha identidade visual. Busco referência, defino paleta, corte no ritmo certo, e entrego no prazo.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_reel\" value=\"4\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Entrego no prazo com o que dá pra fazer agora e proponho uma versão mais trabalhada na sequência.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n      <\u002Fdiv>\n\n      <p class=\"rcq\">Você entregou um carrossel e alguém comenta: \"ficou confuso, difícil de entender\". O que faz? <span class=\"req\">*<\u002Fspan><\u002Fp>\n      <div class=\"rcards\">\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_feedback\" value=\"1\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Peço pra pessoa explicar melhor o que tá confuso antes de mexer.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_feedback\" value=\"2\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Refaço seguindo o que foi apontado e reenvio.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_feedback\" value=\"3\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Identifico onde tava o ruído, corrijo e explico o raciocínio das mudanças.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_feedback\" value=\"4\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Refaço em duas ou três versões diferentes pra discutir junto qual funciona melhor.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n      <\u002Fdiv>\n\n      <div class=\"row r1\"><div class=\"field\">\n        <label class=\"lbl\" for=\"referencias\">Contas, marcas ou projetos visuais que você acompanha <span class=\"req\">*<\u002Fspan><\u002Flabel>\n        <textarea id=\"referencias\" placeholder=\"Perfil no Instagram, marca, festival, veículo — qualquer coisa que você admire visualmente.\"><\u002Ftextarea>\n        <span class=\"hint\">Isso diz mais sobre repertório do que uma nota de 1 a 5.<\u002Fspan>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SEC 3 -->\n  <section class=\"sec sec3\" data-sec=\"2\">\n    <aside class=\"sec-num\">\n      <div class=\"num-row\"><span class=\"big\">03<\u002Fspan><span class=\"of\">/04<\u002Fspan><\u002Fdiv>\n      <span class=\"swatch\"><\u002Fspan>\n    <\u002Faside>\n    <div class=\"sec-body\">\n      <h2 class=\"sec-title\">Perfil e <span class=\"accent\">disponibilidade<\u002Fspan>.<\u002Fh2>\n      <p class=\"sec-lead\">Como você se move quando ninguém tá olhando, e quanto tempo da semana entra no grupo.<\u002Fp>\n\n      <div class=\"scale-block\">\n        <p class=\"scale-q\">O quanto você costuma propor ideias sem esperar ser chamado(a)? <span class=\"req\">*<\u002Fspan><\u002Fp>\n        <div class=\"scale\">\n          <label><input type=\"radio\" name=\"proatividade\" value=\"1\"><div class=\"sb\">1<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"proatividade\" value=\"2\"><div class=\"sb\">2<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"proatividade\" value=\"3\"><div class=\"sb\">3<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"proatividade\" value=\"4\"><div class=\"sb\">4<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"proatividade\" value=\"5\"><div class=\"sb\">5<\u002Fdiv><\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"scale-ends\"><span>Espero a demanda chegar<\u002Fspan><span>Proponho sem ser pedido<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"rcq\">Passou uma semana sem ninguém te pedir nada. Qual é o movimento natural? <span class=\"req\">*<\u002Fspan><\u002Fp>\n      <div class=\"rcards\">\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_proatividade\" value=\"1\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Espero a próxima pauta. Se não me chamaram, é porque não tem demanda pra mim.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_proatividade\" value=\"2\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Mando uma mensagem perguntando se posso ajudar em alguma coisa.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_proatividade\" value=\"3\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Olho o que a gente tá produzindo, vejo onde dá pra melhorar e mando uma proposta concreta.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_proatividade\" value=\"4\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Apareço na próxima reunião com rascunho ou protótipo já feito. Prefiro mostrar a falar.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n      <\u002Fdiv>\n\n      <div class=\"scale-block\">\n        <p class=\"scale-q\">Como você lida com prazos combinados em contexto voluntário? <span class=\"req\">*<\u002Fspan><\u002Fp>\n        <div class=\"scale\">\n          <label><input type=\"radio\" name=\"prazo\" value=\"1\"><div class=\"sb\">1<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"prazo\" value=\"2\"><div class=\"sb\">2<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"prazo\" value=\"3\"><div class=\"sb\">3<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"prazo\" value=\"4\"><div class=\"sb\">4<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"prazo\" value=\"5\"><div class=\"sb\">5<\u002Fdiv><\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"scale-ends\"><span>Tenho dificuldade<\u002Fspan><span>Cumpro com consistência<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"rcq\">Você assumiu entrega pra sexta. Na quarta surgiu uma urgência pessoal. O que rola? <span class=\"req\">*<\u002Fspan><\u002Fp>\n      <div class=\"rcards\">\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_prazo\" value=\"1\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Não consigo entregar e explico depois. A urgência pessoal veio primeiro.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_prazo\" value=\"2\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Aviso na hora que percebi e peço um novo prazo combinado.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_prazo\" value=\"3\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Aviso a equipe, mando uma versão parcial na sexta e finalizo logo depois.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"cenario_prazo\" value=\"4\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Reorganizo minha agenda da semana pra conseguir entregar no prazo que combinei.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n      <\u002Fdiv>\n\n      <div class=\"row r1\"><div class=\"field\">\n        <label class=\"lbl\" for=\"horas\">Horas por semana disponíveis pro voluntariado <span class=\"req\">*<\u002Fspan><\u002Flabel>\n        <select id=\"horas\">\n          <option value=\"\">Selecione<\u002Foption>\n          <option>Menos de 2h<\u002Foption>\n          <option>2 a 4h<\u002Foption>\n          <option>4 a 6h<\u002Foption>\n          <option>Mais de 6h<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SEC 4 -->\n  <section class=\"sec sec4\" data-sec=\"3\">\n    <aside class=\"sec-num\">\n      <div class=\"num-row\"><span class=\"big\">04<\u002Fspan><span class=\"of\">/04<\u002Fspan><\u002Fdiv>\n      <span class=\"swatch\"><\u002Fspan>\n    <\u002Faside>\n    <div class=\"sec-body\">\n      <h2 class=\"sec-title\">Motivação <span class=\"accent\">e causa<\u002Fspan>.<\u002Fh2>\n      <p class=\"sec-lead\">Por que esse grupo, e o que te trouxe até aqui. A parte que mais importa.<\u002Fp>\n\n      <div class=\"scale-block\">\n        <p class=\"scale-q\">Nível de identificação com a causa e os objetivos do CPN <span class=\"req\">*<\u002Fspan><\u002Fp>\n        <div class=\"scale\">\n          <label><input type=\"radio\" name=\"identificacao\" value=\"1\"><div class=\"sb\">1<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"identificacao\" value=\"2\"><div class=\"sb\">2<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"identificacao\" value=\"3\"><div class=\"sb\">3<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"identificacao\" value=\"4\"><div class=\"sb\">4<\u002Fdiv><\u002Flabel>\n          <label><input type=\"radio\" name=\"identificacao\" value=\"5\"><div class=\"sb\">5<\u002Fdiv><\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"scale-ends\"><span>Ainda conhecendo<\u002Fspan><span>Totalmente identificado(a)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"rcq\">Como você chegou até a gente? <span class=\"req\">*<\u002Fspan><\u002Fp>\n      <div class=\"rcards\">\n        <label class=\"rcard\"><input type=\"radio\" name=\"como_conheceu\" value=\"Indicação\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Por indicação de amigo ou colega.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"como_conheceu\" value=\"Redes sociais\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Pelas redes sociais do CPN ou do WYF.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"como_conheceu\" value=\"Movimento/organização\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Pelo meu coletivo, partido ou organização de atuação.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"como_conheceu\" value=\"Evento\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">Em algum evento, palestra ou encontro presencial.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n        <label class=\"rcard\"><input type=\"radio\" name=\"como_conheceu\" value=\"Outro\">\n          <div class=\"rci\"><div class=\"rdot\"><\u002Fdiv><div class=\"rtxt\">De outro jeito que não tá nas opções acima.<\u002Fdiv><\u002Fdiv><\u002Flabel>\n      <\u002Fdiv>\n\n      <div class=\"row r1\"><div class=\"field\">\n        <label class=\"lbl\" for=\"motivacao\">Por que você quer fazer parte do GT de Comunicação? <span class=\"req\">*<\u002Fspan><\u002Flabel>\n        <textarea id=\"motivacao\" placeholder=\"Conta o que te motivou a se inscrever e o que espera contribuir.\" style=\"min-height:110px\"><\u002Ftextarea>\n      <\u002Fdiv><\u002Fdiv>\n\n      <div class=\"row r1\"><div class=\"field\">\n        <label class=\"lbl\" for=\"portfolio\">Portfólio ou trabalhos pra compartilhar <span class=\"opt\">opcional<\u002Fspan><\u002Flabel>\n        <input type=\"text\" id=\"portfolio\" placeholder=\"Link do Behance, Instagram, Drive, etc.\">\n        <span class=\"hint\">Muito bem-vindo. Não é eliminatório.<\u002Fspan>\n      <\u002Fdiv><\u002Fdiv>\n\n      <div class=\"row r1\"><div class=\"field\">\n        <label class=\"lbl\" for=\"obs\">Algo mais que queira contar <span class=\"opt\">opcional<\u002Fspan><\u002Flabel>\n        <textarea id=\"obs\" placeholder=\"Experiências anteriores, perguntas, qualquer coisa.\"><\u002Ftextarea>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<!-- SUBMIT -->\n<div class=\"cta\">\n  <div class=\"cta-inner\">\n    <div class=\"cta-body\">\n      <div class=\"cta-eyebrow\">Falta só apertar enviar<\u002Fdiv>\n      <h2 class=\"cta-title\">Tudo <span class=\"accent\">certo<\u002Fspan>?<\u002Fh2>\n      <p class=\"cta-desc\">Revise as respostas e envie. O retorno vem pelo e-mail que você informou.<\u002Fp>\n      <button class=\"send\" id=\"btn-submit\" type=\"button\" onclick=\"enviar()\">\n        Enviar inscrição\n        <span class=\"arrow\">→<\u002Fspan>\n      <\u002Fbutton>\n      <p class=\"loading\" id=\"loading\">Mandando pro time<\u002Fp>\n      <p class=\"errbox\" id=\"erro-box\">Não rolou registrar agora. Tenta de novo em alguns segundos.<\u002Fp>\n      <div class=\"success\" id=\"sucesso\">\n        <div class=\"success-eyebrow\">— Recebido<\u002Fdiv>\n        <div class=\"success-title\">Inscrição <span class=\"accent\">enviada<\u002Fspan>.<\u002Fdiv>\n        <p class=\"success-desc\">Recebemos tudo. A equipe vai analisar e entrar em contato pelo e-mail que você informou. Que bom ter você junto.<\u002Fp>\n      <\u002Fdiv>\n      <p class=\"send-note\" id=\"send-note\">Os campos marcados com <span style=\"color:#f0529c\">*<\u002Fspan> são obrigatórios.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FOOTER -->\n<footer class=\"foot\">\n  <div class=\"foot-l\">\n    <b>CPN<\u002Fb>\n    Grupo de Trabalho de Comunicação<br>\n    World Youth Festival · 2026\n  <\u002Fdiv>\n  <div class=\"foot-r\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n<\u002Ffooter>\n\n<script>\nconst ENDPOINT = 'https://script.google.com/macros/s/AKfycbyY0NFfV_9LDT-oE7QjWWgCGHBSF89FY3GU1QHADA49juA0xJKY1iBachCklbI4afQYHg/exec';\n\n// --- progress rail\nconst rail = document.getElementById('rail');\nconst railBar = document.getElementById('railBar');\nconst sections = document.querySelectorAll('.sec');\nconst stepEls = document.querySelectorAll('.rail-step');\n\nfunction onScroll(){\n  const h = document.documentElement;\n  const max = h.scrollHeight - h.clientHeight;\n  const p = max > 0 ? (h.scrollTop / max) * 100 : 0;\n  railBar.style.setProperty('--p', p + '%');\n  rail.classList.toggle('scrolled', h.scrollTop > 8);\n\n  // active section\n  const mid = h.scrollTop + window.innerHeight * 0.35;\n  let activeIdx = 0;\n  sections.forEach((s, i) => {\n    const top = s.offsetTop;\n    if (mid >= top) activeIdx = i;\n  });\n  stepEls.forEach((el, i) => {\n    el.classList.toggle('active', i === activeIdx);\n    el.classList.toggle('done', i < activeIdx);\n  });\n}\ndocument.addEventListener('scroll', onScroll, {passive:true});\nwindow.addEventListener('load', onScroll);\n\n// --- section reveal on scroll\nconst io = new IntersectionObserver((entries)=>{\n  entries.forEach(e=>{\n    if(e.isIntersecting){\n      e.target.classList.add('in');\n      io.unobserve(e.target);\n    }\n  });\n},{threshold:.18, rootMargin:'0px 0px -10% 0px'});\n// only animate sections currently below the fold; show in-view sections immediately\nconst vh = window.innerHeight;\nsections.forEach(s=>{\n  const top = s.getBoundingClientRect().top;\n  if (top > vh * 0.85){\n    s.classList.add('will-reveal');\n    io.observe(s);\n  }\n});\n\n// --- ambient cursor blob: removed per request\n\n// --- ripple on chip + radio card tap (subtle)\nfunction rippleAt(host, x, y, color){\n  const r = document.createElement('span');\n  const size = Math.max(host.offsetWidth, host.offsetHeight) * 1.4;\n  Object.assign(r.style, {\n    position:'absolute', left:(x-size/2)+'px', top:(y-size/2)+'px',\n    width:size+'px', height:size+'px', borderRadius:'50%',\n    background:color, opacity:'.35', pointerEvents:'none',\n    transform:'scale(0)', transition:'transform .55s ease-out, opacity .55s ease-out'\n  });\n  const wrap = host.querySelector('span, .rci');\n  if (!wrap) return;\n  const prevPos = getComputedStyle(wrap).position;\n  if (prevPos === 'static') wrap.style.position = 'relative';\n  wrap.style.overflow = 'hidden';\n  wrap.appendChild(r);\n  requestAnimationFrame(()=>{\n    r.style.transform = 'scale(1)';\n    r.style.opacity = '0';\n  });\n  setTimeout(()=>r.remove(), 600);\n}\n\ndocument.querySelectorAll('.chip, .rcard').forEach(host=>{\n  host.addEventListener('pointerdown', (e)=>{\n    const rect = host.getBoundingClientRect();\n    const sec = host.closest('.sec');\n    const idx = sec ? [...sections].indexOf(sec) : 0;\n    const colors = ['rgba(45,179,74,.5)','rgba(245,194,0,.5)','rgba(26,46,114,.4)','rgba(240,82,156,.5)'];\n    rippleAt(host, e.clientX - rect.left, e.clientY - rect.top, colors[idx] || colors[0]);\n  });\n});\n\n// --- scale buttons: lateral cascade fill\ndocument.querySelectorAll('.scale').forEach(scale=>{\n  const labels = [...scale.querySelectorAll('label')];\n  labels.forEach((lbl, i)=>{\n    lbl.addEventListener('mouseenter', ()=>{\n      labels.forEach((l,j)=>{\n        const sb = l.querySelector('.sb');\n        if (!sb) return;\n        sb.style.transitionDelay = (Math.abs(i-j) * 30) + 'ms';\n        sb.style.transform = j <= i ? 'translateY(-3px)' : '';\n        sb.style.opacity = j <= i ? '1' : '.7';\n      });\n    });\n    lbl.addEventListener('mouseleave', ()=>{\n      labels.forEach((l)=>{\n        const sb = l.querySelector('.sb');\n        if (!sb) return;\n        sb.style.transitionDelay = '0ms';\n        sb.style.transform = '';\n        sb.style.opacity = '';\n      });\n    });\n  });\n});\n\n// --- magnetic submit button\nconst sendBtn = document.getElementById('btn-submit');\nif (sendBtn && !matchMedia('(hover:none)').matches){\n  sendBtn.addEventListener('pointermove', (e)=>{\n    const r = sendBtn.getBoundingClientRect();\n    const mx = e.clientX - (r.left + r.width/2);\n    const my = e.clientY - (r.top + r.height/2);\n    sendBtn.style.transform = `translate(${mx*0.18}px, ${my*0.22}px) translateY(-2px)`;\n  });\n  sendBtn.addEventListener('pointerleave', ()=>{\n    sendBtn.style.transform = '';\n  });\n}\n\nstepEls.forEach(el => {\n  el.addEventListener('click', () => {\n    const idx = +el.dataset.jump;\n    sections[idx].scrollIntoView({behavior:'smooth', block:'start'});\n  });\n});\n\n// --- form helpers\nfunction v(id){ const el=document.getElementById(id); return el?el.value.trim():''; }\nfunction radio(n){ const el=document.querySelector('input[name=\"'+n+'\"]:checked'); return el?el.value:''; }\nfunction chips(n){ return [].slice.call(document.querySelectorAll('input[name=\"'+n+'\"]:checked')).map(e=>e.value).join(', '); }\n\nfunction coletarDados(){\n  return {\n    timestamp:      new Date().toLocaleString('pt-BR'),\n    nome:           v('nome'),\n    email:          v('email'),\n    cidade:         v('cidade'),\n    estado:         v('estado'),\n    idade:          v('idade'),\n    formacao:       v('formacao'),\n    area:           v('area'),\n    ocupacao:       v('ocupacao'),\n    militancia:     v('militancia'),\n    ferramentas:    chips('tools'),\n    formatos:       chips('formatos'),\n    nivel_visual:   radio('nivel_visual'),\n    cenario_reel:   radio('cenario_reel'),\n    cenario_feedback: radio('cenario_feedback'),\n    referencias:    v('referencias'),\n    proatividade:   radio('proatividade'),\n    cenario_proatividade: radio('cenario_proatividade'),\n    prazo:          radio('prazo'),\n    cenario_prazo:  radio('cenario_prazo'),\n    horas:          v('horas'),\n    identificacao:  radio('identificacao'),\n    como_conheceu:  radio('como_conheceu'),\n    motivacao:      v('motivacao'),\n    portfolio:      v('portfolio'),\n    obs:            v('obs')\n  };\n}\n\nfunction marcarErro(el){\n  const f = el.closest('.field');\n  if (f) f.classList.add('field-error');\n}\nfunction limparErros(){\n  document.querySelectorAll('.field-error').forEach(el=>el.classList.remove('field-error'));\n}\n\nfunction validar(){\n  limparErros();\n  let ok = true;\n  let firstBad = null;\n\n  ['nome','email','cidade','estado','formacao','ocupacao','horas','referencias','motivacao'].forEach(id=>{\n    const el = document.getElementById(id);\n    if (el && !el.value.trim()){\n      marcarErro(el);\n      if (!firstBad) firstBad = el;\n      ok = false;\n    }\n  });\n\n  ['nivel_visual','cenario_reel','cenario_feedback','proatividade','cenario_proatividade','prazo','cenario_prazo','identificacao','como_conheceu'].forEach(n=>{\n    if(!document.querySelector('input[name=\"'+n+'\"]:checked')){\n      ok=false;\n      if(!firstBad) firstBad = document.querySelector('input[name=\"'+n+'\"]');\n    }\n  });\n\n  if(!document.querySelector('input[name=\"tools\"]:checked')) ok = false;\n  if(!document.querySelector('input[name=\"formatos\"]:checked')) ok = false;\n\n  if(!ok && firstBad){\n    firstBad.closest('.sec, .scale-block, .chips-block, .rcards, .field')?.scrollIntoView({behavior:'smooth', block:'center'});\n  }\n  return ok;\n}\n\nasync function enviar(){\n  if(!validar()) return;\n  const btn = document.getElementById('btn-submit');\n  btn.disabled = true;\n  document.getElementById('loading').style.display='block';\n  document.getElementById('erro-box').style.display='none';\n  try{\n    await fetch(ENDPOINT, {\n      method:'POST', mode:'no-cors',\n      headers:{'Content-Type':'application/json'},\n      body:JSON.stringify(coletarDados())\n    });\n    btn.style.display='none';\n    document.getElementById('loading').style.display='none';\n    document.getElementById('send-note').style.display='none';\n    document.getElementById('sucesso').style.display='block';\n    window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});\n  }catch(e){\n    btn.disabled=false;\n    document.getElementById('loading').style.display='none';\n    document.getElementById('erro-box').style.display='block';\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
